<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nam Hải Oracle v10.5 – Final Hook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; --card-bg: #161616; --text: #eee; --cyan: #00ffcc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; text-align: center; padding: 15px; margin: 0; -webkit-user-select: none; user-select: none; }
        .container { max-width: 500px; margin: auto; }
        h2 { color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        p.sub { font-size: 12px; color: #666; margin-bottom: 20px; line-height: 1.5; }
        input, select, button, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 16px; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        textarea { height: 100px; border: 1px solid #333; resize: none; outline: none; }
        .check-group { text-align: left; font-size: 13px; color: #888; display: flex; align-items: flex-start; gap: 8px; }
        .check-group input { width: auto; margin-top: 3px; }
        button { background: var(--gold); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .result-card { border: 1px solid #222; border-radius: 20px; background: var(--card-bg); padding: 20px; text-align: left; animation: fadeIn 0.6s ease; margin-bottom: 20px; }
        .reflection-box { background: #000; padding: 15px; border-radius: 12px; border-left: 4px solid var(--gold); margin-top: 15px; }
        .pierce-box { margin-top: 15px; padding: 15px; background: rgba(255, 204, 0, 0.08); border-radius: 10px; border: 1px dashed var(--gold); animation: slideUp 0.4s ease; }
        .hidden { display: none; }
        #final-analysis { white-space: pre-wrap; text-align: left; line-height: 1.8; padding: 20px; background: #000; border-radius: 15px; border: 1px solid #333; margin-top: 20px; }
        .btn-half { width: 48%; display: inline-block; font-size: 14px; }
        .hook-box { margin-top:15px; padding:15px; background:var(--gold); color:black; border-radius:10px; font-weight:bold; cursor:pointer; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>NAM HẢI ORACLE</h2>
    <p class="sub">Đối diện sự thật để thiết lập lại vận mệnh.</p>

    <div id="setup-zone">
        <input id="userName" placeholder="Tên của bạn...">
        <div style="display: flex; gap: 8px; margin: 5px 0;">
            <select id="birthDay" style="width: 25%; margin: 0;"></select>
            <select id="birthMonth" style="width: 40%; margin: 0;"></select>
            <select id="birthYear" style="width: 35%; margin: 0;"></select>
        </div>
        <select id="mainTopic">
            <option value="money">TÀI CHÍNH & SỰ NGHIỆP</option>
            <option value="love">TÌNH CẢM & MỐI QUAN HỆ</option>
        </select>
        <textarea id="userStory" placeholder="Vấn đề gì đang bóp nghẹt tâm trí bạn?..."></textarea>
        <div class="check-group">
            <input type="checkbox" id="ageCheck">
            <label for="ageCheck">Tôi xác nhận trên 18 tuổi và đủ bản lĩnh đối diện sự thật.</label>
        </div>
        <button onclick="initDraw()">KHAI MỞ CỬA MỆNH</button>
    </div>

    <div id="drawZone"></div>

    <div id="finalZone" class="hidden">
        <div id="final-analysis"></div>
        <div id="decision-fork" style="margin-top: 20px;">
            <button class="btn-half" style="background:#222; color:#777;" onclick="staySame()">GIỮ LỐI CŨ</button>
            <button class="btn-half" onclick="changePath()">THAY ĐỔI NGAY</button>
        </div>
        <div id="action-plan" class="hidden" style="margin-top:20px; padding:15px; background:rgba(0,255,204,0.1); border-radius:12px; border: 1px solid var(--cyan);">
            <p style="color:var(--cyan); font-weight:bold; margin-top:0;">⚡ BẢN ĐỒ HÀNH ĐỘNG 24H (PHẢI THỰC HIỆN):</p>
            <div id="action-list" style="text-align:left; font-size:14px; line-height: 1.6;"></div>
            <div class="hook-box" onclick="alert('Tính năng chuyên sâu đang được khai mở cho riêng bạn. Vui lòng liên hệ Admin.')">
                MỞ KHÓA PHÂN TÍCH LÁ THỨ 6 (QUYẾT ĐỊNH)
            </div>
            <button onclick="location.reload()" style="background:#333; color:#fff; margin-top:20px; font-size:12px;">KẾT THÚC PHIÊN SOI MÌNH</button>
        </div>
    </div>
</div>

<script>
    // Dữ liệu lá bài (giữ nguyên cấu trúc v10.4)
    const tarotData = {
        0: { n:"The Fool", money:{m:"Kế hoạch mới thiếu điểm tựa.", q:"Bạn thực sự thấy cơ hội, hay chỉ đang dùng dự án này để trốn chạy thực tại?", x:"Dũng cảm và liều lĩnh chỉ cách nhau một sợi chỉ: Sự hiểu biết.", a:"Liệt kê 3 rủi ro lớn nhất bạn đang cố lờ đi."}, love:{m:"Khởi đầu cảm xúc nhất thời.", q:"Điều gì khiến bạn tin rằng họ sẽ đi cùng bạn khi giông bão tới?", x:"Sự thật không phải bạn yêu, mà là bạn sợ lẻ bóng.", a:"Tự hỏi: Nếu họ không đổi, bạn có chịu được 1 năm nữa?"} },
        // ... (Anh hãy copy full 22 lá vào đây)
        21: { n:"The World", money:{m:"Đỉnh núi ảo.", q:"Hoàn thành cái này xong, mục tiêu tiếp theo là gì?", x:"Điểm dừng là khởi đầu cho hành trình mới.", a:"Tổng kết bài học lớn nhất trong dự án vừa qua."}, love:{m:"Viên mãn giả tạo.", q:"Bạn tìm thấy sự bình yên bên trong mình chưa?", x:"Thế giới trọn vẹn nhất là khi không cần ai để đủ.", a:"Tự thưởng cho mình 1 ngày bình yên."} }
    };

    let selectedCards = [], currentStep = 0, userAnswers = [], userActions = [];

    window.onload = function() {
        const dS = document.getElementById('birthDay');
        for(let i=1; i<=31; i++) dS.options.add(new Option(i, i));
        const mS = document.getElementById('birthMonth');
        for(let i=1; i<=12; i++) mS.options.add(new Option("Tháng " + i, i));
        const yS = document.getElementById('birthYear');
        const cy = new Date().getFullYear();
        for(let i = cy; i >= 1940; i--) yS.options.add(new Option(i, i));
    };

    function isValidDate(d, m, y) {
        const date = new Date(y, m - 1, d);
        return date.getFullYear() === y && date.getMonth() === m - 1 && date.getDate() === d;
    }

    function initDraw() {
        const name = document.getElementById("userName").value.trim();
        const d = parseInt(document.getElementById("birthDay").value);
        const m = parseInt(document.getElementById("birthMonth").value);
        const y = parseInt(document.getElementById("birthYear").value);
        const story = document.getElementById("userStory").value.trim();
        const ageChecked = document.getElementById("ageCheck").checked;

        if (!name || story.length < 10) return alert("Vui lòng nhập tên và tâm sự thật lòng.");
        if (!isValidDate(d, m, y)) return alert("Ngày sinh không hợp lệ.");

        const today = new Date();
        let age = today.getFullYear() - y;
        if (today.getMonth() + 1 < m || (today.getMonth() + 1 === m && today.getDate() < d)) age--;

        if (age < 18) return alert("Ứng dụng dành cho người trên 18 tuổi. Vui lòng quay lại khi đủ điều kiện.");
        if (!ageChecked) return alert("Vui lòng xác nhận cam kết bản lĩnh.");

        // Reset UI & Data
        document.getElementById("drawZone").innerHTML = "";
        selectedCards = []; currentStep = 0; userAnswers = []; userActions = [];
        document.getElementById("setup-zone").classList.add("hidden");
        
        let allKeys = Object.keys(tarotData).map(Number);
        while(selectedCards.length < 5) {
            let r = allKeys[Math.floor(Math.random()*allKeys.length)];
            if(!selectedCards.includes(r)) selectedCards.push(r);
        }
        showCard();
    }

    function showCard() {
        const topic = document.getElementById("mainTopic").value;
        const cardId = selectedCards[currentStep];
        const card = tarotData[cardId] || tarotData[0];
        const data = card[topic] || card["money"]; // Safe fallback
        const steps = ["GỐC RỄ", "HIỆN TẠI", "NÚT THẮT", "HÀNH ĐỘNG", "KẾT QUẢ"];
        
        document.getElementById("drawZone").innerHTML = `
            <div class="result-card">
                <small style="color:var(--gold)">BƯỚC ${currentStep + 1}: ${steps[currentStep]}</small>
                <p style="font-weight:bold;color:gold;margin:10px 0;">LÁ BÀI: ${card.n}</p>
                <p><b>Tiên sinh:</b> ${data.m}</p>
                <div class="reflection-box">
                    <span style="color:var(--cyan);font-style:italic;display:block;margin-bottom:8px;"><b>Truy vấn:</b> ${data.q}</span>
                    <textarea id="ans_${currentStep}" placeholder="Sự thật là..."></textarea>
                </div>
                <div id="pierce_${currentStep}" class="hidden"></div>
                <button id="btn_${currentStep}" onclick="pierceStep()" style="margin-top:15px;">XÁC NHẬN</button>
            </div>`;
    }

    function pierceStep() {
        const inputArea = document.getElementById(`ans_${currentStep}`);
        let val = inputArea.value.trim();
        if(val.length < 5) return alert("Hãy thành thật hơn.");
        
        inputArea.disabled = true;
        const topic = document.getElementById("mainTopic").value;
        const cardData = tarotData[selectedCards[currentStep]][topic] || tarotData[selectedCards[currentStep]]["money"];
        
        let dynamicAct = cardData.a + " (Thực hiện trong 24h tới, không trì hoãn)";
        const lowVal = val.toLowerCase();
        if(lowVal.includes("sợ")) dynamicAct += " → Đối diện trực tiếp nỗi sợ này.";
        if(lowVal.includes("tiền")) dynamicAct += " → Ghi chép dòng tiền ngay.";
        if(lowVal.includes("họ") || lowVal.includes("người")) dynamicAct += " → Ngừng phụ thuộc cảm xúc vào họ.";

        userAnswers.push(val);
        userActions.push(dynamicAct);

        document.getElementById(`pierce_${currentStep}`).innerHTML = `<div class="pierce-box"><p style="color:gold; font-weight:bold; margin:0 0 5px 0;">🔥 ĐỐI DIỆN:</p><p style="margin:0; font-size:14px;">${cardData.x}</p></div>`;
        document.getElementById(`pierce_${currentStep}`).classList.remove("hidden");
        
        const btn = document.getElementById(`btn_${currentStep}`);
        btn.innerText = (currentStep < 4) ? "TIẾP TỤC" : "XEM KẾT CỤC";
        btn.onclick = function() {
            currentStep++;
            if(currentStep < 5) showCard(); else finalize();
        };
    }

    function finalize() {
        document.getElementById("drawZone").innerHTML = "";
        document.getElementById("finalZone").classList.remove("hidden");
        let longestAns = userAnswers.reduce((a, b) => a.length > b.length ? a : b);
        let resultCard = tarotData[selectedCards[4]] || tarotData[0];
        let topic = document.getElementById("mainTopic").value;
        
        let empathy = `Tôi đọc được rằng bạn đang thực sự mắc kẹt trong một vòng lặp mà chính bạn cũng cảm thấy mệt mỏi.\n\n`;
        
        document.getElementById("final-analysis").innerHTML = empathy + 
            `🔥 ĐIỂM TỬ HUYỆT: <span style="color:gold;">"${longestAns}"</span>\n\n` +
            `📍 KẾT CỤC: Nếu giữ lối mòn, bạn sẽ lặp lại lá "${resultCard[topic]?.m || resultCard["money"].m}"`;
    }

    function staySame() {
        document.getElementById("final-analysis").innerText = "Bạn đã chọn quay lại vòng lặp cũ. Không có gì thay đổi nếu bạn vẫn giữ cách tư duy cũ.";
        document.getElementById("decision-fork").classList.add("hidden");
    }

    function changePath() {
        document.getElementById("decision-fork").classList.add("hidden");
        document.getElementById("action-plan").classList.remove("hidden");
        document.getElementById("action-list").innerHTML = userActions.map((act, i) => `
            <p style="border-bottom:1px solid #222; padding-bottom:8px; margin:10px 0;">
                <b>Bước ${i + 1}:</b> ${act}
            </p>`).join("");
    }
</script>
</body>
</html>
